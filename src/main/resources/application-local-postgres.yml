spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/armazem_ingredientes
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  seed:
    enabled: true