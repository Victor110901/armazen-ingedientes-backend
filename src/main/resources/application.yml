spring:
  application:
    name: armazem-backend

  profiles:
    active: local-h2

  jpa:
    open-in-view: false

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000