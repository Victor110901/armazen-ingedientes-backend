services:
  postgres:
    image: postgres:16
    container_name: armazem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: armazem_ingredientes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - armazem_postgres_data:/var/lib/postgresql/data

volumes:
  armazem_postgres_data: